<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribblelogue - Period Tracker</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .breathe-animation { animation: breathe 8s ease-in-out infinite; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.4); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase Configuration ---
        // const firebaseConfig = JSON.parse(__firebase_config);
        // firebase.initializeApp(firebaseConfig);
        // const auth = firebase.auth();
        // const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'scribblelogue-tracker-101';

        // --- SVGs for Icons ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                droplets: <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z" />,
                calendar: (
                    <>
                        <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                        <path d="M16 2v4M8 2v4M3 10h18" />
                    </>
                ),
                book: (
                    <>
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5z" />
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                    </>
                ),
                wind: (
                    <>
                        <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2" />
                        <path d="M9.6 4.6A2 2 0 1 1 11 8H2" />
                        <path d="M12.6 19.4A2 2 0 1 0 14 16H2" />
                    </>
                ),
                settings: (
                    <>
                        <circle cx="12" cy="12" r="3" />
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </>
                ),
                plus: <path d="M12 5v14M5 12h14" />,
                minus: <path d="M5 12h14" />,
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const CYCLE_INSIGHTS = {
            menstrual: {
                phase: "Menstrual Phase",
                fact: "Hey kid, your body is in a 'reset' mode. It's the perfect time for restorative movement to clear your mind.",
                food: "Focus on iron-rich foods like spinach or lentils for steady energy.",
                walk: "A gentle 20-minute rhythmic walk in nature will release endorphins.",
                mood: "Reflective and Intuitive",
                waterNote: "2.5L today helps your body with circulation during this reset.",
                breathePrompt: "Inhale for 4, Hold for 4, Exhale for 4. Ground your energy.",
                bg: "bg-rose-50", accent: "text-rose-600", btn: "bg-rose-500"
            },
            follicular: {
                phase: "Follicular Phase",
                fact: "Hey kid, your estrogen is climbing! This naturally boosts your serotonin. Use this energy for a creative project.",
                food: "Fermented foods like yogurt support estrogen metabolism for a glowing complexion.",
                walk: "Power walk! 30 minutes at a brisk pace will capitalize on rising stamina.",
                mood: "Energetic and Creative",
                waterNote: "Aim for 2.2L to keep your cells hydrated for that rising estrogen glow.",
                breathePrompt: "Deep belly breaths to fuel your creative fire.",
                bg: "bg-blue-50", accent: "text-blue-600", btn: "bg-blue-500"
            },
            ovulation: {
                phase: "Ovulatory Phase",
                fact: "You are at your most social and confident today, Kid! Your peak enhances your strength and fluidity.",
                food: "Light, hydrating foods like berries support high metabolic activity.",
                walk: "Social walk! Invite a friend for a 40-minute stroll.",
                mood: "Confident and Magnetic",
                waterNote: "Try for 3L today to support your peak metabolic activity.",
                breathePrompt: "Slow exhales to stay centered in your social power.",
                bg: "bg-purple-50", accent: "text-purple-600", btn: "bg-purple-500"
            },
            luteal: {
                phase: "Luteal Phase",
                fact: "Progesterone is helping you feel more grounded. Kid, use this time to organize and find comfort in routine.",
                food: "Complex carbs like sweet potatoes help maintain steady blood sugar.",
                walk: "Grounding walk. 25 minutes of slow, intentional walking.",
                mood: "Grounded and Task-Oriented",
                waterNote: "Sipping 2.5L helps your body manage progesterone's fluid shifts.",
                breathePrompt: "4-7-8 breathing: Inhale 4, Hold 7, Exhale 8. Embrace the calm.",
                bg: "bg-amber-50", accent: "text-amber-600", btn: "bg-amber-500"
            }
        };

        function App() {
            const [user, setUser] = useState(null);
            const [cycleDay, setCycleDay] = useState(1);
            const [cycleLength, setCycleLength] = useState(28);
            const [lastPeriodDate, setLastPeriodDate] = useState(new Date().toISOString().split('T')[0]);
            const [waterCount, setWaterCount] = useState(0);
            const [journalText, setJournalText] = useState("");
            const [journalEntries, setJournalEntries] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showSettings, setShowSettings] = useState(false);
            const [isBreathing, setIsBreathing] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const statsDoc = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stats').doc('config');
                const unsubStats = statsDoc.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        setCycleLength(data.cycleLength || 28);
                        setLastPeriodDate(data.lastPeriodDate || new Date().toISOString().split('T')[0]);
                        setWaterCount(data.waterCount || 0);
                    }
                });

                const journalCol = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('journal');
                const unsubJournal = journalCol.onSnapshot((snapshot) => {
                    const entries = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setJournalEntries(entries.sort((a, b) => b.timestamp - a.timestamp));
                });

                return () => { unsubStats(); unsubJournal(); };
            }, [user]);

            useEffect(() => {
                const today = new Date(); today.setHours(0,0,0,0);
                const start = new Date(lastPeriodDate); start.setHours(0,0,0,0);
                const diffDays = Math.floor((today.getTime() - start.getTime()) / (1000 * 60 * 60 * 24));
                setCycleDay(((diffDays % cycleLength) + cycleLength) % cycleLength + 1);
            }, [lastPeriodDate, cycleLength]);

            const updateConfig = (updates) => {
                if (!user) return;
                db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('stats').doc('config')
                  .set(updates, { merge: true });
            };

            const saveJournal = async () => {
                if (!user || !journalText.trim()) return;
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('journal').add({
                    text: journalText,
                    day: cycleDay,
                    timestamp: Date.now(),
                    dateString: new Date().toLocaleDateString()
                });
                setJournalText("");
            };

            const currentPhase = useMemo(() => {
                const progress = cycleDay / cycleLength;
                if (progress <= 0.2) return CYCLE_INSIGHTS.menstrual;
                if (progress <= 0.45) return CYCLE_INSIGHTS.follicular;
                if (progress <= 0.55) return CYCLE_INSIGHTS.ovulation;
                return CYCLE_INSIGHTS.luteal;
            }, [cycleDay, cycleLength]);

            if (loading) return <div className="flex items-center justify-center h-screen bg-rose-50 text-rose-400 font-bold">Syncing Scribblelogue...</div>;

            return (
                <div className={`min-h-screen transition-all duration-700 pb-12 ${currentPhase.bg} p-6`}>
                    <div className="max-w-xl mx-auto space-y-6">
                        <header className="flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-black text-slate-900">Scribblelogue</h1>
                                <p className="text-slate-500 font-medium">Master your emotions, Kid ✨</p>
                            </div>
                            <button onClick={() => setShowSettings(!showSettings)} className="p-3 bg-white rounded-2xl shadow-sm border border-slate-100">
                                <Icon name="settings" className="text-slate-400" />
                            </button>
                        </header>

                        {showSettings && (
                            <div className="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 animate-bounce-in">
                                <h2 className="font-bold mb-4 flex items-center gap-2"><Icon name="calendar" className="text-indigo-500" /> Settings</h2>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase">Last Period</label>
                                        <input type="date" value={lastPeriodDate} onChange={(e) => updateConfig({ lastPeriodDate: e.target.value })} className="w-full p-3 bg-slate-50 rounded-xl outline-none" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase">Cycle Length</label>
                                        <div className="flex items-center bg-slate-50 rounded-xl p-1">
                                            <button onClick={() => updateConfig({ cycleLength: cycleLength - 1 })} className="p-2"> - </button>
                                            <span className="flex-1 text-center font-bold">{cycleLength} days</span>
                                            <button onClick={() => updateConfig({ cycleLength: cycleLength + 1 })} className="p-2"> + </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="flex items-center justify-center gap-4">
                            <div className="h-px bg-slate-200 flex-1"></div>
                            <div className="bg-white px-4 py-1 rounded-full text-xs font-black text-slate-400 uppercase tracking-tighter shadow-sm">Cycle Day {cycleDay}</div>
                            <div className="h-px bg-slate-200 flex-1"></div>
                        </div>

                        <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden">
                            <div className={`absolute -right-4 -top-4 opacity-5 ${currentPhase.accent}`}><Icon name="sparkles" className="w-40 h-40" /></div>
                            <span className={`inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-3 ${currentPhase.bg} ${currentPhase.accent}`}>{currentPhase.phase}</span>
                            <h2 className="text-xl font-bold mb-2">Hormone Hack</h2>
                            <p className="text-slate-600 text-sm leading-relaxed mb-6">{currentPhase.fact}</p>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100"><p className="text-[10px] font-bold text-slate-400">EAT</p><p className="text-xs font-semibold">{currentPhase.food}</p></div>
                                <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100"><p className="text-[10px] font-bold text-slate-400">MOVE</p><p className="text-xs font-semibold">{currentPhase.walk}</p></div>
                            </div>
                        </section>

                        <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                            <h3 className="font-bold flex items-center justify-center gap-2 mb-4"><Icon name="heart" className="text-rose-400" /> Breathe & Reset</h3>
                            <div className={`mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 ${currentPhase.bg} ${isBreathing ? 'breathe-animation' : ''}`}>
                                <Icon name="wind" className={currentPhase.accent} />
                            </div>
                            <p className="text-xs text-slate-500 mb-4">{currentPhase.breathePrompt}</p>
                            <button onClick={() => setIsBreathing(!isBreathing)} className={`w-full py-3 rounded-xl text-white font-bold text-xs uppercase tracking-widest transition-all ${isBreathing ? 'bg-slate-900' : currentPhase.btn}`}>
                                {isBreathing ? 'Resetting...' : 'Start Session'}
                            </button>
                        </section>

                        <div className="grid grid-cols-2 gap-4">
                            <section className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                <h3 className="font-bold text-sm mb-4 flex items-center gap-2"><Icon name="droplets" className="text-blue-500" /> Hydration</h3>
                                <div className="flex gap-1 mb-4 h-12 items-end">
                                    {[...Array(8)].map((_, i) => <div key={i} className={`flex-1 rounded-full transition-all ${i < waterCount ? 'bg-blue-400 h-10' : 'bg-blue-50 h-4'}`} />)}
                                </div>
                                <p className="text-[10px] text-blue-700 italic mb-4 leading-tight">{currentPhase.waterNote}</p>
                                <div className="flex gap-2">
                                    <button onClick={() => updateConfig({ waterCount: Math.max(0, waterCount - 1) })} className="flex-1 bg-slate-50 py-2 rounded-xl flex justify-center border border-slate-100"><Icon name="minus" /></button>
                                    <button onClick={() => updateConfig({ waterCount: Math.min(12, waterCount + 1) })} className="flex-1 bg-blue-500 text-white py-2 rounded-xl flex justify-center shadow-lg shadow-blue-100"><Icon name="plus" /></button>
                                </div>
                            </section>

                            <section className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center justify-center text-center">
                                <Icon name="wind" className="text-emerald-500 mb-2" />
                                <p className="text-[10px] font-bold text-slate-400 uppercase">Vibe Check</p>
                                <p className="text-lg font-bold text-slate-800 leading-tight">{currentPhase.mood}</p>
                            </section>
                        </div>

                        <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                            <h3 className="font-bold mb-4 flex items-center gap-2"><Icon name="book" className="text-indigo-500" /> Journal</h3>
                            <textarea value={journalText} onChange={(e) => setJournalText(e.target.value)} placeholder="How are you feeling, kid?" className="w-full h-24 bg-slate-50 rounded-2xl p-4 text-sm outline-none resize-none mb-4" />
                            <button onClick={saveJournal} disabled={!journalText.trim()} className="w-full py-4 bg-indigo-500 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 disabled:opacity-50">Save Entry</button>
                            
                            {journalEntries.length > 0 && (
                                <div className="mt-6 space-y-3">
                                    {journalEntries.slice(0, 2).map(entry => (
                                        <div key={entry.id} className="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                            <div className="flex justify-between text-[10px] font-bold text-slate-400 mb-1"><span>{entry.dateString}</span><span>Day {entry.day}</span></div>
                                            <p className="text-xs text-slate-600 italic">"{entry.text}"</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </section>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
